apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-alerts
  namespace: monitoring
spec:
  groups:
    - name: pod.rules
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
          for: 5m
          labels:
            severity: critical
            level: P0
          annotations:
            summary: "Pod is crashing repeatedly"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting frequently."

        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="true"} == 0
          for: 5m
          labels:
            severity: warning
            level: P1
          annotations:
            summary: "Pod is not ready"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is not ready."

        - alert: PodMemoryHigh
          expr: sum by (pod, namespace) (container_memory_working_set_bytes{container!=""}) / sum by (pod, namespace) (kube_pod_container_resource_limits{resource="memory"}) > 0.9
          for: 5m
          labels:
            severity: warning
            level: P1
          annotations:
            summary: "High memory usage in pod"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} memory usage exceeds 90%."
