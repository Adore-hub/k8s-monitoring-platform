apiVersion: monitapiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-alerts
  namespace: monitoring
spec:
  groups:
    - name: node.rules
      rules:
        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 2m
          labels:
            severity: critical
            level: P0
          annotations:
            summary: "Node exporter is down"
            description: "Node exporter on {{ $labels.instance }} has been unreachable for more than 2 minutes."

        - alert: NodeCPUHigh
          expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 5m
          labels:
            severity: warning
            level: P1
          annotations:
            summary: "High CPU usage on node"
            description: "CPU usage on {{ $labels.instance }} is above 85%."

        - alert: NodeMemoryHigh
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 5m
          labels:
            severity: warning
            level: P1
          annotations:
            summary: "High memory usage on node"
            description: "Memory usage on {{ $labels.instance }} is above 85%."

        - alert: NodeDiskWillFillIn4Hours
          expr: predict_linear(node_filesystem_free_bytes{fstype!~"tmpfs|overlay"}[6h], 4 * 3600) < 0
          for: 10m
          labels:
            severity: warning
            level: P2
          annotations:
            summary: "Disk may run out within 4 hours"
            description: "Filesystem on {{ $labels.instance }} is predicted to run out of space within 4 hours."
